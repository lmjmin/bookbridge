<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>마이페이지 - BookBridge</title>
  <link href="/Design.css" rel="stylesheet"/>
  <script src="./js/config.js?v=20251106"></script>
  <style>
    .wrap{max-width:980px;margin:20px auto;padding:0 16px;}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px}
    .tab{padding:8px 12px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer}
    .tab.active{background:#111;color:#fff;border-color:#111}
    .grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
    .card{border:1px solid #eee;border-radius:12px;overflow:hidden;background:#fff}
    .thumb{width:100%;aspect-ratio:3/4;background:#fafafa;display:block}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .meta{padding:10px}
    .title{font-weight:700;line-height:1.35;height:2.7em;overflow:hidden}
    .price{color:#111;margin-top:6px}
    .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
    .btn{padding:8px 10px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer}
    .btn.primary{background:#111;color:#fff;border-color:#111}
    .empty{color:#666;margin:18px 4px}
    .profile{display:flex;gap:14px;align-items:center;border:1px solid #eee;border-radius:12px;background:#fff;padding:12px;margin-bottom:12px}
    .avatar{width:56px;height:56px;border-radius:50%;border:1px solid #eee;display:flex;align-items:center;justify-content:center;font-weight:800}
    @media(max-width:980px){ .grid{grid-template-columns:repeat(3,minmax(0,1fr));} }
    @media(max-width:600px){ .grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
  </style>
</head>
<body>
  <div class="container">
    <header class="solo-header">
      <div class="logo-auth-container">
        <div class="logo" style="cursor:pointer" onclick="location.href='first.html'">
          <img src="/media/로고.png" alt="BookBridge 로고"/>
          <h1>BookBridge</h1>
        </div>
      </div>
    </header>

    <main class="wrap">
      <!-- 프로필 -->
      <section class="profile" id="profileBox">
        <div class="avatar" id="pfAvatar">BB</div>
        <div style="flex:1">
          <div id="pfName" style="font-weight:800"></div>
          <div id="pfMeta" class="hint"></div>
        </div>
        <button class="btn" id="editBtn">홈으로</button>
      </section>

      <!-- 탭 -->
      <div class="tabs">
        <button class="tab active" data-tab="mine">내 판매글</button>
        <button class="tab" data-tab="wish">찜 목록</button>
        <button class="tab" data-tab="dm">쪽지</button>
      </div>

      <!-- 내 판매글 -->
      <section id="tab-mine">
        <div class="grid" id="mineGrid"></div>
        <div class="empty" id="mineEmpty" style="display:none">판매글이 없습니다.</div>
      </section>

      <!-- 찜 목록 -->
      <section id="tab-wish" style="display:none">
        <div class="grid" id="wishGrid"></div>
        <div class="empty" id="wishEmpty" style="display:none">찜한 항목이 없습니다.</div>
      </section>

      <!-- 쪽지 -->
      <section id="tab-dm" style="display:none">
        <div class="empty">쪽지는 <b>DM 페이지</b>에서 보기/전송 가능합니다.</div>
        <div style="margin-top:10px"><button class="btn primary" onclick="location.href='dm.html'">DM 열기</button></div>
      </section>
    </main>
  </div>

  <!-- 공용 API -->
  <script src="/js/api.js?v=20251106"></script>

  <!-- 🔥 찜(하트) / wishlist 기능 스크립트 추가 -->
  <script src="/js/wishlist.js?v=20251106"></script>

  <!-- 이 페이지 전용 스크립트 -->
  <script>
    const API_BASE = (window.API_BASE ?? "").toString().replace(/\/+$/,"");
    const $=(s,r=document)=>r.querySelector(s);
    const esc=(s)=>(s??"").toString().replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;","&gt;":"&gt;"}[m]));
    function img(u){
      if(!u) return "media/no-image.png";
      const s=String(u).trim();
      if(/^https?:\/\//i.test(s) || s.startsWith("data:")) return s;
      if(s.startsWith("/")) return API_BASE+s;
      return s;
    }

    // 프로필
    (function(){
      const u = API.user.get?.() || (function(){try{return JSON.parse(localStorage.getItem('user')||'null')}catch{return null}})();
      if (!u){ alert("로그인이 필요합니다."); location.href="login.html"; return; }
      const name = u.name || u.username || (u.email||"").split("@")[0] || "사용자";
      $("#pfName").textContent = name;
      $("#pfAvatar").textContent = name.slice(0,2).toUpperCase();
      $("#pfMeta").textContent = [u.university||u.school, u.major, u.email].filter(Boolean).join(" · ");
    })();

    function canonicalId(b){ return (b?.id ?? b?.bookId ?? b?.listingId ?? b?.isbn ?? "").toString(); }

    // 내 판매글
    async function loadMine(){
      const grid = $("#mineGrid"), empty=$("#mineEmpty");
      const list = await API.mySales();
      if (!list.length){ grid.innerHTML=""; empty.style.display="block"; return; }
      empty.style.display="none";
      grid.innerHTML = list.map(b=>{
        const id = canonicalId(b);
        return `
          <div class="card">
            <a class="thumb" href="detail.html?id=${encodeURIComponent(id)}">
              <img src="${img(b.thumbnail||b.imageUrl)}" alt="${esc(b.title||'')}"/>
            </a>
            <div class="meta">
              <div class="title">${esc(b.title||"")}</div>
              <div class="price">${b.price?Number(b.price).toLocaleString()+"원":""}</div>
              <div class="row">
                <button class="btn" onclick="location.href='detail.html?id=${encodeURIComponent(id)}'">보기</button>
                <button class="btn" data-del="${esc(id)}">삭제</button>
                <button class="btn wishlist-btn" data-wish-btn data-book-id="${esc(id)}">♡</button>
              </div>
            </div>
          </div>`;
      }).join("");
      document.dispatchEvent(new Event("wishlist:invalidate"));
    }

        document.addEventListener('click', async (e)=>{
      const b = e.target.closest("[data-del]"); if(!b) return;

      const id = b.getAttribute("data-del");
      console.log("삭제 클릭 ID:", id);

      if (!confirm("정말 삭제하시겠습니까?")) return;

      const ok = await API.deleteListing(id);
      console.log("삭제 결과 ok?", ok);

      if (!ok) return alert("삭제 실패");
      document.dispatchEvent(new CustomEvent("bookbridge:item-removed",{detail:{bookId:id}}));
      loadMine();
    });


      // 🔁 찜 목록 - 서버 기준으로 다시 구현
      async function renderWish(){
      const grid  = $("#wishGrid");
      const empty = $("#wishEmpty");

      // 1) 로그인 유저 확인
      const u = API.user.get?.() || (function(){
        try { return JSON.parse(localStorage.getItem("user") || "null"); }
        catch { return null; }
      })();

      if (!u) {
        alert("로그인이 필요합니다.");
        location.href = "login.html";
        return;
      }

      const userId = u.id || u.userId;
      if (!userId) {
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      // 2) 서버에서 내 찜 ID 목록 가져오기: /api/wishlist?userId=...
      let ids = [];
      try {
        const r = await fetch(
          `${API_BASE}/api/wishlist?userId=${encodeURIComponent(userId)}`,
          { credentials: "include", cache: "no-store" }
        );
        if (r.ok) {
          const data = await r.json().catch(() => null);
          if (Array.isArray(data)) ids = data;
          else if (Array.isArray(data?.items)) ids = data.items;
        } else {
          console.warn("wishlist list 실패:", r.status);
        }
      } catch (e) {
        console.warn("wishlist list 에러:", e);
      }

      // 서버에 찜이 하나도 없으면
      if (!ids.length) {
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      // 3) 각 listingId 로 /api/listings/{id} 호출해서 상세 정보 가져오기
      const list = [];
      for (const id of ids) {
        try {
          const r = await fetch(`${API_BASE}/api/listings/${encodeURIComponent(id)}`, {
            credentials: "include",
            cache: "no-store",
          });
          if (!r.ok) continue;
          const item = await r.json().catch(() => null);
          if (item) list.push(item);
        } catch (_) {
          // 개별 항목 실패는 무시
        }
      }

      if (!list.length) {
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      // 4) 카드 렌더링
      empty.style.display = "none";
      grid.innerHTML = list.map(b => {
        const id = canonicalId(b);
        return `
          <div class="card">
            <a class="thumb" href="detail.html?id=${encodeURIComponent(id)}">
              <img src="${img(b.thumbnail || b.imageUrl)}" alt="${esc(b.title || "")}" />
            </a>
            <div class="meta">
              <div class="title">${esc(b.title || "")}</div>
              <div class="price">
                ${b.price ? Number(b.price).toLocaleString() + "원" : ""}
              </div>
              <div class="row">
                <button class="btn" onclick="location.href='detail.html?id=${encodeURIComponent(id)}'">보기</button>
                <button class="btn wishlist-btn" data-wish-btn data-book-id="${esc(id)}">♡</button>
              </div>
            </div>
          </div>`;
      }).join("");

      // 5) 새로 그린 버튼들에 하트 상태 다시 입히기
      document.dispatchEvent(new Event("wishlist:invalidate"));
    }


    // 탭
    function activate(tab){
      document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x.dataset.tab===tab));
      $("#tab-mine").style.display = tab==='mine' ? "" : "none";
      $("#tab-wish").style.display = tab==='wish' ? "" : "none";
      $("#tab-dm").style.display   = tab==='dm'   ? "" : "none";
    }
    document.addEventListener("click", (e)=>{
      const t = e.target.closest(".tab"); if(!t) return;
      activate(t.dataset.tab);
      if (t.dataset.tab === "mine") loadMine();
      if (t.dataset.tab === "wish") renderWish();
    });

    // 🔁 홈으로 버튼 동작: first.html로 이동
    const homeBtn = document.getElementById("editBtn");
    if (homeBtn) {
      homeBtn.addEventListener("click", () => {
        location.href = "first.html";
      });
    }

    (async function init(){
      activate("mine");
      await loadMine();
      window.Wishlist?.init?.(); // 찜 버튼 상태 동기화
    })();
  </script>
</body>
</html>
