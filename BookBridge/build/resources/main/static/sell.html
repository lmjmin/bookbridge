<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>판매글 등록 | BookBridge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/js/force-https.js?v=20251113"></script>
  <script src="/js/api-base.js?v=20251112"></script>
  <script src="/js/config.js?v=20251112"></script>
  <script src="/js/kakao-config.js"></script>
  <script src="/js/kakao-book.js?v=20251112"></script>

  <style>
    :root{ --acc:#ff450a; --ink:#0f172a; --mut:#64748b; --line:#eef2f7; --card:#fff; --bg:#fafbff; --rad:14px; }
    *{box-sizing:border-box} html,body{margin:0}
    body{font-family:system-ui,Segoe UI,Malgun Gothic,Apple SD Gothic Neo,Arial;background:var(--bg);color:var(--ink)}
    .header{position:sticky;top:0;z-index:10;background:linear-gradient(#fff,rgba(255,255,255,.92));
      backdrop-filter:saturate(1.2) blur(6px);display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;color:var(--acc)} .brand img{width:30px;height:30px}
    .wrap{max-width:960px;margin:28px auto;padding:0 16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px rgba(15,23,42,.05)}
    .head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
    .head h1{font-size:20px;letter-spacing:-.3px;margin:0}
    .body{padding:18px 20px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media (max-width:860px){ .grid{grid-template-columns:1fr} }
    .field{display:flex;flex-direction:column;gap:8px}
    .label{font-size:13px;color:var(--mut)}
    .inp,.area{width:100%;border:1.6px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;transition:.15s}
    .inp:focus,.area:focus{border-color:var(--acc);box-shadow:0 0 0 4px rgba(255,69,10,.08)}
    .hint{font-size:12px;color:#8a94a6}
    .thumb{border:2px dashed var(--line);border-radius:16px;min-height:200px;display:flex;align-items:center;justify-content:center;color:#9aa6b2}
    .searchbox{position:relative}
    #titleSearchList{position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);
      border-radius:14px;box-shadow:0 16px 40px rgba(15,23,42,.08);overflow:hidden;max-height:320px;overflow-y:auto;z-index:20}
    #titleSearchList:empty{display:none}
    .k-item{display:flex;gap:10px;align-items:center;width:100%;padding:10px 12px;border:0;background:#fff;cursor:pointer;border-bottom:1px solid #f6f7fb;text-align:left}
    .k-item:last-child{border-bottom:0}
    .k-item:hover{background:#fff6f2}
    .k-item img{width:34px;height:48px;object-fit:cover;border-radius:6px;border:1px solid #f0f2f6;background:#f7f8fb}
    .k-item .meta{display:grid;gap:2px}
    .k-item .meta .title{font-weight:700}
    .k-item .meta .sub{font-size:12px;color:#7b8697}
    .foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line);background:#fff;border-radius:0 0 18px 18px}
    .btn{border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}
    .btn.sec{background:#f5f7fb;color:#0f172a} .btn.pri{background:var(--ink);color:#fff} .btn:disabled{opacity:.6;cursor:not-allowed}
    .mt8{margin-top:8px}
  </style>
</head>
<body>
<header class="header">
  <div class="brand" onclick="location.href='first.html'" style="cursor:pointer"><img src="media/로고.png" alt="logo"><span>BookBridge</span></div>
</header>

<main class="wrap">
  <section class="card">
    <div class="head"><h1>판매글 등록</h1></div>
    <div class="body">
      <div class="grid">
        <div class="field searchbox">
          <div class="label">제목 *</div>
          <input id="title" class="inp" placeholder="책 제목 입력 또는 검색" autocomplete="off">
          <div id="titleSearchList"></div>
          <div class="hint">검색 결과를 클릭하면 저자·출판사·ISBN·표지가 자동으로 채워집니다.</div>
        </div>
        <div class="field">
          <div class="label">ISBN</div>
          <input id="isbn" class="inp" placeholder="가능하면 입력(숫자)" inputmode="numeric">
          <div class="hint">제목 검색 선택 시 자동으로 채워져요.</div>
        </div>
      </div>

      <div class="grid mt8">
        <div class="field"><div class="label">저자 *</div><input id="author" class="inp" placeholder="저자명"></div>
        <div class="field"><div class="label">가격(원) *</div><input id="price" class="inp" placeholder="숫자만" inputmode="numeric"></div>
      </div>

      <div class="grid mt8">
        <div class="field"><div class="label">출판사 *</div><input id="publisher" class="inp" placeholder="출판사"></div>
        <div class="field"><div class="label">판매자 연락처</div><input id="phone" class="inp" placeholder="010-0000-0000"></div>
      </div>

      <div class="grid mt8">
        <div class="field"><div class="label">대학/학과</div><input id="major" class="inp" placeholder="예: 동명대 컴퓨터공학과"></div>
        <div class="field"><div class="label">상태/설명</div><textarea id="desc" class="area" rows="4" placeholder="예: 밑줄 없음, 겉표지 생활기스"></textarea></div>
      </div>

      <div class="grid mt8">
        <div class="field">
          <div class="label">대표 이미지</div>
          <input type="file" id="image" class="inp" accept="image/*">
          <div class="hint">선택하면 오른쪽에 미리보기 됩니다.</div>
        </div>
        <div class="field">
          <div class="label">&nbsp;</div>
          <div class="thumb" style="padding:0">
            <img id="previewImg" alt="미리보기" style="width:100%;max-height:260px;object-fit:contain;display:block;background:#fafafa;border-radius:16px;border:1px solid #eef2f7">
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <button class="btn sec" type="button" onclick="history.back()">취소</button>
      <button id="btnSubmit" class="btn pri" type="button">등록</button>
    </div>
  </section>
</main>

<script>
const $ = (s,r=document)=>r.querySelector(s);
$("#image").addEventListener("change", e=>{
  const f = e.target.files && e.target.files[0];
  if(!f){ $("#previewImg").src = ""; return; }
  const rd = new FileReader();
  rd.onload = ev => { $("#previewImg").src = ev.target.result; };
  rd.readAsDataURL(f);
});

const API_BASE = (window.API_BASE ?? "").replace(/\/+$/,"");
function toast(t){
  const el=document.createElement("div");
  el.textContent=t;
  Object.assign(el.style,{position:"fixed",left:"50%",bottom:"22px",transform:"translateX(-50%)",
    background:"#111",color:"#fff",padding:"10px 14px",borderRadius:"10px",fontSize:"14px",
    boxShadow:"0 10px 30px rgba(0,0,0,.2)",zIndex:9999,opacity:0,transition:"opacity .2s"});
  document.body.appendChild(el); requestAnimationFrame(()=>el.style.opacity=1);
  setTimeout(()=>{el.style.opacity=0; setTimeout(()=>el.remove(),200);},1500);
}

document.getElementById("btnSubmit").addEventListener("click", async function () {
  const title       = $("#title").value.trim();
  const author      = $("#author").value.trim();
  const publisher   = $("#publisher").value.trim();
  const isbn        = $("#isbn").value.replace(/[^0-9Xx]/g, "");
  const priceStr    = ($("#price").value || "").replace(/\D/g, "");
  const university  = $("#major").value.trim();
  const sellerPhone = $("#phone").value.trim();
  const condition   = $("#desc").value.trim();

  if (!title || !author || !publisher || !priceStr) {
    toast("필수(제목/저자/출판사/가격) 입력");
    return;
  }

  const fd = new FormData();
  fd.append("title", title);
  fd.append("author", author);
  fd.append("publisher", publisher);
  fd.append("isbn", isbn);
  fd.append("price", priceStr);               // 백엔드에서 parsePrice로 숫자만 다시 처리
  fd.append("university", university);
  fd.append("sellerPhone", sellerPhone);
  fd.append("conditionText", condition);

  const imageInput = document.getElementById("image");
  if (imageInput && imageInput.files && imageInput.files[0]) {
    fd.append("image", imageInput.files[0]);  // 🔥 백엔드의 MultipartFile image 매핑
  }

  const btn = this;
  btn.disabled = true;
  btn.textContent = "등록 중…";

  let ok = false, msg = "";

  try {
    const r = await fetch(`${API_BASE}/api/listings`, {
      method: "POST",
      body: fd,
      credentials: "include"
      // ⚠️ Content-Type 직접 지정하지 말 것! 브라우저가 multipart boundary 포함해서 알아서 붙임
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && (j.ok !== false)) {
      ok = true;
    } else {
      msg = j.message || `${r.status} ${r.statusText}`;
    }
  } catch (e) {
    msg = String(e);
  }

  btn.disabled = false;
  btn.textContent = "등록";

  if (!ok) {
    toast("등록 실패: " + (msg || "서버"));
    return;
  }
  toast("등록 완료!");
  setTimeout(() => location.href = "first.html", 600);
});

</script>
</body>
</html>
