<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>프로필 | BookBridge</title>

  <link rel="stylesheet" href="/Design.css" />

  <!-- profile 전용(스코프 한정) -->
  <style>
    #profile-page {
      max-width: 1100px;
      margin: 24px auto 80px;
      padding: 0 14px;
    }
    #profile-page .section {
      margin-top: 18px;
    }

    /* 상단 요약 카드: 프로젝트 공용 .seller-card 톤 재사용 */
    .seller-card {
      justify-content: space-between;
    }
    .seller-card .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eee;
      font-weight: 700;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* 평점 카드 */
    .review-grid {
      display: grid;
      gap: 10px;
    }
    .review-card {
      border: 1px solid #f1f1f1;
      border-radius: 12px;
      background: #fff;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .review-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .review-from {
      font-weight: 700;
    }
    .review-time {
      color: #666;
      font-size: 12px;
    }
    .review-content {
      font-size: 14px;
      line-height: 1.55;
    }
    .stars {
      color: #ff4509;
      letter-spacing: 1px;
    }
    .empty {
      color: #666;
      padding: 12px;
    }

    @media (min-width: 700px) {
      .review-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 980px) {
      .review-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* 판매자 판매글 카드 */
    .sale-grid {
      margin-top: 4px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .sale-card {
      border: 1px solid #f1f1f1;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .sale-cover {
      width: 100%;
      aspect-ratio: 3/4;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .sale-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sale-meta {
      padding: 10px 12px 12px;
    }
    .sale-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      height: 2.8em;
      overflow: hidden;
    }
    .sale-price {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 800;
      color: #ff450a;
    }
  </style>
</head>

<body>
  <!-- 상단: 로고만 (공개 모드) -->
  <header class="solo-header" style="margin-top:10px">
    <div class="logo-auth-container">
      <div class="logo" onclick="location.href='first.html'" style="cursor:pointer">
        <img src="/media/로고.png" alt="BookBridge 로고" />
        <h1>BookBridge</h1>
      </div>
    </div>
  </header>

  <main id="profile-page">

    <!-- 프로필 요약 -->
    <section class="seller-card">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="avatar" id="avatar">U</div>
        <div>
          <div class="user-id" id="user-id" style="font-weight:700">@unknown</div>
          <div class="detail-meta" id="sub-meta" style="margin-top:4px;">공개 프로필</div>
        </div>
      </div>

      <div>
        <span class="pill">
          <span class="stars" id="avg-stars">★★★★★</span>
          <span id="avg-rating">0.0</span>
          <span class="detail-meta" id="review-count">(0)</span>
        </span>
      </div>
    </section>

    <!-- 탭 느낌 -->
    <div class="sec-tabs" style="margin-top:16px;">
      <a class="active">평점</a>
    </div>

    <!-- 평점 목록 -->
    <section class="section">
      <div class="review-grid" id="reviews-list"></div>
      <div class="empty" id="empty-box" style="display:none;">등록된 평점이 없습니다.</div>
    </section>

    <!-- 🔥 판매자 판매글 목록 -->
    <section class="section">
      <h2 style="font-size:16px;margin-bottom:10px;color:#ff450a;">판매중인 상품</h2>
      <div id="seller-sales" class="sale-grid"></div>
      <div id="sales-empty" class="empty" style="display:none;">판매중인 상품이 없습니다.</div>
    </section>

  </main>

    <script>
    // =========================
    // 공개 프로필: ?user=&name=&email=&dept=&school=
    // =========================
    const params     = new URLSearchParams(location.search);
    const userId     = (params.get('user')   || '').trim();
    const userName   = (params.get('name')   || '').trim();
    const userEmail  = (params.get('email')  || '').trim();   // 🔥 판매자 이메일
    const userDept   = (params.get('dept')   || '').trim();
    const userSchool = (params.get('school') || '').trim();

    const displayName = userName || userId || '알 수 없는 사용자';

    const $id   = document.getElementById('user-id');
    const $av   = document.getElementById('avatar');
    const $meta = document.getElementById('sub-meta');

    if ($id)  $id.textContent = displayName;
    if ($av)  $av.textContent = (displayName[0] || 'U').toUpperCase();

    const metaParts = [];
    if (userDept)   metaParts.push(userDept);
    if (userSchool) metaParts.push(userSchool);
    if ($meta) {
      $meta.textContent = metaParts.length
        ? metaParts.join(' · ')
        : '공개 프로필';
    }

    // 공통 API base
    const API_BASE = (window.API_BASE ?? '').toString().replace(/\/+$/, '');

    // 유틸
    const esc = s =>
      (s ?? '').toString()
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');


    function starText(n) {
      const full = Math.max(0, Math.min(5, n | 0));
      return '★'.repeat(full) + '☆'.repeat(5 - full);
    }

        // 이미지 경로 정리
    function resolveImg(u) {
      if (!u) return '/media/no-image.png';
      const s = String(u).trim();
      if (/^https?:\/\//i.test(s) || s.startsWith('data:')) return s;
      if (s.startsWith('/')) return s;
      return '/' + s.replace(/^\/+/, '');
    }

    function canonicalId(b) {
      return (b?.id ?? b?.listingId ?? b?.bookId ?? '').toString();
    }

    // 🔥 판매자 판매글 불러오기
    async function loadSales() {
      const box   = document.getElementById('seller-sales');
      const empty = document.getElementById('sales-empty');
      if (!box || !empty) return;

      if (!userEmail) {
        // 이메일 없으면 그냥 "없음" 표시만
        empty.style.display = 'block';
        return;
      }

      const url = `${API_BASE}/api/listings/mine?email=${encodeURIComponent(userEmail)}`;

      try {
        const res = await fetch(url, { credentials: 'include' });
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);

        const list = await res.json();
        if (!Array.isArray(list) || !list.length) {
          box.innerHTML = '';
          empty.style.display = 'block';
          return;
        }

        empty.style.display = 'none';
        box.innerHTML = list.map(b => {
          const id    = canonicalId(b);
          const img   = resolveImg(b.thumbnail || b.imageUrl || b.coverImage);
          const title = esc(b.title || b.bookTitle || '');
          const price =
            (b.price != null) ? `${Number(b.price).toLocaleString()}원` : '';

          return `
            <a class="sale-card" href="detail.html?id=${encodeURIComponent(id)}">
              <div class="sale-cover">
                <img src="${img}" alt="">
              </div>
              <div class="sale-meta">
                <div class="sale-title">${title}</div>
                <div class="sale-price">${price}</div>
              </div>
            </a>
          `;
        }).join('');
      } catch (e) {
        console.error('PROFILE sales error', e);
        box.innerHTML = '';
        empty.style.display = 'block';
      }
    }


    // 평점 불러오기(프론트 임시 스키마)
    function loadReviews(sellerId) {
      try {
        const raw = localStorage.getItem(`bb_reviews:${sellerId}`);
        const arr = JSON.parse(raw || '[]');
        if (Array.isArray(arr)) return arr;
      } catch {}
      return [];
    }

    // 데모용 더미 데이터
    function dummyIfEmpty(list) {
      if (list.length) return list;
      return [
        { from:'buyerA', score:5, text:'책 상태 훌륭, 응대 빠름.', ts: Date.parse('2025-09-27T09:05:00') },
        { from:'buyerB', score:4, text:'설명과 거의 일치했습니다.', ts: Date.parse('2025-09-10T18:42:00') }
      ];
    }

    function render(list) {
      const box = document.getElementById('reviews-list');
      const empty = document.getElementById('empty-box');
      const cnt = list.length;

      document.getElementById('review-count').textContent = `(${cnt})`;

      if (!cnt) {
        document.getElementById('avg-rating').textContent = '0.0';
        document.getElementById('avg-stars').textContent = starText(0);

        box.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      const avg = (list.reduce((s, r) => s + (r.score || 0), 0) / cnt).toFixed(1);
      document.getElementById('avg-rating').textContent = avg;
      document.getElementById('avg-stars').textContent = starText(Math.round(avg));
      empty.style.display = 'none';

      // 최신순 정렬
      list.sort((a, b) => Number(b.ts) - Number(a.ts));

      box.innerHTML = list.map(r => `
        <div class="review-card">
          <div class="review-top">
            <div class="review-from">${esc(r.from || '구매자')}</div>
            <div class="stars">${starText(Number(r.score) || 0)}</div>
          </div>
          <div class="review-content">${esc(r.text || '')}</div>
          <div class="review-time">${new Date(Number(r.ts) || Date.now()).toLocaleString()}</div>
        </div>
      `).join('');
    }

    function init() {
      let reviews = loadReviews(userId);
      if (!reviews.length) reviews = dummyIfEmpty(reviews);
      render(reviews);

      // 🔥 판매자 판매글도 같이 로드
      loadSales();
    }

    init();

    // localStorage 변화 감지
    window.addEventListener('storage', e => {
      if (e.key === `bb_reviews:${userId}`) init();
    });

    /* 백엔드 연동 예정
    fetch(`/api/users/${userId}/reviews`)
      .then(r => r.json())
      .then(data => render(data));
    */
  </script>
</body>
</html>
