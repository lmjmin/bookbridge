# =========================
# MySQL (로컬)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/bookbridge?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=bookbridge25*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 가벼운 Hikari 설정(부팅 지연 완화)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initializationFailTimeout=0
spring.datasource.hikari.validationTimeout=3000
spring.datasource.hikari.connectionTimeout=5000
spring.datasource.hikari.keepaliveTime=300000
spring.datasource.hikari.leakDetectionThreshold=20000

# =========================
# JPA
# =========================
# 스키마 자동 갱신 유지(현재 프로젝트 의존 가능성 있으므로 update 유지)
spring.jpa.hibernate.ddl-auto=update

# 부팅속도/로그 감소
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# SQL 스크립트 자동실행 비활성(부팅 지연 방지)
spring.sql.init.mode=never

# =========================
# Dev 속도 옵션
# =========================
spring.main.lazy-initialization=true
spring.devtools.restart.enabled=false

# H2 콘솔 비활성(불필요한 빈 로딩 방지)
spring.h2.console.enabled=false

# 로깅 감소
logging.level.root=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=OFF

